name: publish-on-tag

# Press-button publish — triggers when a v* tag is pushed OR via the
# "Run workflow" UI button. Builds, runs tests, npm publishes with
# provenance. Requires NPM_TOKEN repo secret (set once at
# Settings → Secrets and variables → Actions → New repository secret).

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. v2.0.3). Leave blank to publish HEAD."
        required: false

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          ref: ${{ inputs.tag || github.ref }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "20.x"
          registry-url: "https://registry.npmjs.org"

      - run: npm ci
      - run: npm run build
      - run: npm test --if-present
      - run: npm pack --dry-run

      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Confirm published version
        run: |
          sleep 30  # registry propagation
          PUBLISHED=$(npm view @etymolt/mcp-server version)
          LOCAL=$(node -p "require('./package.json').version")
          echo "Published: $PUBLISHED · Local: $LOCAL"
          [ "$PUBLISHED" = "$LOCAL" ] || { echo "::error::Version mismatch"; exit 1; }
