name: mcp-registry-publish

# Publishes server.json to registry.modelcontextprotocol.io using
# GitHub Actions OIDC. NO operator secrets required.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  registry-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install mcp-publisher
        run: |
          curl -fsSL https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz | tar xz
          chmod +x mcp-publisher
          ./mcp-publisher --version || true

      - name: Authenticate via GitHub OIDC
        run: ./mcp-publisher login github-oidc

      - name: Verify server.json
        run: |
          python3 -m json.tool server.json | head -30
          PKG_VER=$(node -p "require('./package.json').version")
          SRV_VER=$(python3 -c "import json; print(json.load(open('server.json'))['version'])")
          echo "package.json: $PKG_VER · server.json: $SRV_VER"
          [ "$PKG_VER" = "$SRV_VER" ] || { echo "::error::Version mismatch"; exit 1; }

      - name: Publish to MCP registry
        run: ./mcp-publisher publish ./server.json

      - name: Verify listing propagated
        run: |
          sleep 15
          python3 << 'PYEOF'
          import json, sys, urllib.request
          d = json.load(urllib.request.urlopen("https://registry.modelcontextprotocol.io/v0/servers?search=etymolt"))
          servers = d.get("servers", [])
          match = next((s for s in servers if s.get("server", {}).get("name", "").lower().startswith("io.github.etymolt")), None)
          if not match:
              print("::error::Etymolt not in registry results yet")
              sys.exit(1)
          srv = match["server"]
          print(f"::notice::Etymolt visible in MCP registry: {srv['name']} v{srv['version']}")
          PYEOF
